name: Cornice
options:
  bundleIdPrefix: com.cornice
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

packages:
  Defaults:
    url: https://github.com/sindresorhus/Defaults.git
    from: "9.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"
  LaunchAtLogin-Modern:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern.git
    from: "1.1.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

targets:
  Cornice:
    type: application
    platform: macOS
    sources:
      - path: Cornice
        excludes:
          - "Resources/Info.plist"
          - "Resources/Cornice.entitlements"
    resources:
      - path: Cornice/Resources/Assets.xcassets
      - path: Cornice/Resources/Sounds
        buildPhase: resources
    dependencies:
      - package: Defaults
      - package: KeyboardShortcuts
      - package: LaunchAtLogin-Modern
        product: LaunchAtLogin
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cornice.app
        PRODUCT_NAME: Cornice
        PRODUCT_MODULE_NAME: Cornice
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Cornice/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Cornice/Resources/Cornice.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: NO
        ALWAYS_SEARCH_USER_PATHS: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  CorniceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CorniceTests
    dependencies:
      - target: Cornice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cornice.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Cornice.app/Contents/MacOS/Cornice"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Cornice:
    build:
      targets:
        Cornice: all
        CorniceTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CorniceTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
